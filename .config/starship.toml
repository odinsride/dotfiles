# ~/.config/starship.toml

# Toolbx indicator
[custom.toolbx]
command = "echo $TOOLBX_CONTAINER"
when = "[[ -n $TOOLBX_CONTAINER ]]"
format = "[$symbol$output]($style) "
symbol = "📦 "
style = "bold yellow"

# Show Ruby version
[ruby]
format = "[$symbol($version )]($style)"
symbol = "💎 "
style = "bold red"

# Show Node version
[nodejs]
format = "[$symbol($version )]($style)"
symbol = "⬢ "
style = "bold green"

# Git configuration
[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# Character (prompt symbol)
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

