# ── Prefix ────────────────────────────────────────────
# Ctrl+a is far more ergonomic than Ctrl+b
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # Ctrl+a Ctrl+a passes it through to nested tmux/vim

# ── General ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true color support
set -g history-limit 50000    # scrollback buffer
set -g display-time 4000      # status messages stay visible longer
set -g status-interval 5      # refresh status bar every 5s
set -g focus-events on        # lets vim/nvim know when the pane gains focus
set -sg escape-time 0         # remove esc delay (critical for nvim)
set -g mouse on               # mouse support: click panes, scroll, resize

# ── Windows & panes: 1-indexed ────────────────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on   # keep window numbers gapless on close

# ── Pane splits: intuitive keys ───────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # vertical split, same dir
bind - split-window -v -c "#{pane_current_path}"   # horizontal split, same dir
bind c new-window -c "#{pane_current_path}"         # new window, same dir

# ── Pane navigation: vim-style ────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ─────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode: vi keys ────────────────────────────────
set-window-option -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
# If on Linux with xclip:
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
# If on Wayland:
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# ── Reload config ─────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Status bar ────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"       # subtle dark bar
set -g status-left "#[fg=#7aa2f7,bold] #S "        # session name
set -g status-left-length 20
set -g status-right "#[fg=#565f89] %H:%M  %d %b "
set -g window-status-current-style "fg=#7aa2f7,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
